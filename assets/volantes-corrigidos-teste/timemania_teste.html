<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TESTE IMPRESSÃO — Timemania (não usado pelo app)</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background:#888; font-family: Arial, sans-serif; padding:20px; }
  .info { background:#222; color:#fff; padding:10px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; max-width:600px; }
  .info button { background:#00AB67; border:none; color:#fff; font-weight:700; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:12px; margin-top:8px; }
  .wrap { position:relative; width:80.43mm; height:162.56mm; background:#fff; box-shadow:0 4px 16px rgba(0,0,0,.4); }
  .wrap img { position:absolute; top:0; left:0; width:80.43mm; height:162.56mm; display:block; }
  .mk { position:absolute; background:#000; opacity:.88; box-shadow:0 0 0 0.15mm rgba(255,255,255,.5); }
  .ruler-x { position:absolute; top:-4mm; left:0; width:80.43mm; height:4mm; font-size:1.6mm; color:#000; }
  .ruler-x span { position:absolute; top:0; }
  .ruler-y { position:absolute; left:-6mm; top:0; width:6mm; height:162.56mm; font-size:1.6mm; color:#000; }
  .ruler-y span { position:absolute; left:0; }
  @media print {
    body { background:#fff; padding:0; }
    .info, .no-print { display:none !important; }
    .wrap { box-shadow:none; }
    @page { size: 80.43mm 162.56mm; margin:0; }
  }
</style>
</head>
<body>

<div class="info no-print">
  <strong>🧪 TESTE — Timemania (coordenadas já em produção, sem correção pendente)</strong><br>
  Estas são as mesmas coordenadas já usadas no app hoje — conferidas antes de publicar (marcas caindo
  em cima de tinta real em 6/6 pontos de checagem). Imprima em escala 100% e confirme com régua.<br>
  <button onclick="window.print()">🖨 Imprimir este teste</button>
</div>

<div class="wrap" id="wrap">
  <img src="timemania.jpg"/>
  <div id="marks"></div>
  <div class="ruler-x no-print" id="rulerX"></div>
  <div class="ruler-y no-print" id="rulerY"></div>
</div>

<script>
// Painel único 10x8 (80 números) + Teimosinha (dados já em produção, VOLANTE_IMG.timemania)
const cols = [12.255,18.479,24.934,31.433,37.888,44.302,50.673,57.087,63.585,70.062];
const rows = [23.918,27.58,31.242,34.84,38.502,42.143,45.784,49.467];
const teimosinhaRow = {row:159.385, cells:[
  {v:3,x:24.68},{v:6,x:31.136},{v:9,x:37.592},{v:12,x:44.027},
]};

const PITCH_W = cols[1]-cols[0], PITCH_H = rows[1]-rows[0];
const MW = PITCH_W*0.42, MH = PITCH_H*0.62;

let html='';
function mark(x,y,w,h){ html += `<div class="mk" style="left:${x-w/2}mm;top:${y-h/2}mm;width:${w}mm;height:${h}mm"></div>`; }
cols.forEach(cx => rows.forEach(cy => mark(cx,cy,MW,MH)));
teimosinhaRow.cells.forEach(c => mark(c.x, teimosinhaRow.row, MW, MH));
document.getElementById('marks').innerHTML = html;

let rx='', ry='';
for(let x=0; x<=80; x+=5) rx += `<span style="left:${x}mm">${x}</span>`;
for(let y=0; y<=163; y+=5) ry += `<span style="top:${y}mm">${y}</span>`;
document.getElementById('rulerX').innerHTML = rx;
document.getElementById('rulerY').innerHTML = ry;
</script>
</body>
</html>
